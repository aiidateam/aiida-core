append_text: QbStrField(backend_key=attributes.append_text, is_attribute=True, dtype=str,
  doc='Bash commands that should be appended to the run line in all submit scripts
  for this code')
attributes: QbAttributesField(dtype=InstalledCode.AttributesModel, doc='The node attributes')
computer: QbNumericField(dtype=int, doc='The pk of the remote computer on which the
  executable resides')
ctime: QbNumericField(dtype=datetime, doc='The creation time of the node')
default_calc_job_plugin: QbStrField(backend_key=attributes.input_plugin, is_attribute=True,
  dtype=str | None, root=str, doc='Entry point name of the default plugin (as listed
  in `verdi plugin list aiida.calculations`)')
description: QbStrField(dtype=str, doc='The node description')
extras: QbDictField(dtype=dict[str, Any], root=dict, doc='The node extras')
filepath_executable: QbStrField(backend_key=attributes.filepath_executable, is_attribute=True,
  dtype=str, doc='Filepath of the executable on the remote computer')
label: QbStrField(dtype=str, doc='The node label')
mtime: QbNumericField(dtype=datetime, doc='The modification time of the node')
node_type: QbStrField(dtype=Literal['data.core.code.installed.InstalledCode.'], root=Literal,
  doc='The type of the node.')
pk: QbNumericField(dtype=int, doc='The primary key of the entity')
prepend_text: QbStrField(backend_key=attributes.prepend_text, is_attribute=True, dtype=str,
  doc='Bash commands that should be prepended to the run line in all submit scripts
  for this code')
process_type: QbStrField(dtype=str | None, root=str, doc='The process type of the
  node')
repository_metadata: QbDictField(dtype=dict[str, Any], root=dict, doc='Virtual hierarchy
  of the file repository')
source: QbDictField(backend_key=attributes.source, is_attribute=True, dtype=dict |
  None, root=dict, doc='Source of the data')
use_double_quotes: QbAnyField(backend_key=attributes.use_double_quotes, is_attribute=True,
  dtype=bool, doc='Whether the executable and arguments of the code in the submission
  script should be escaped with single or double quotes')
user: QbNumericField(dtype=int, doc='The PK of the user who owns the node')
uuid: QbAnyField(dtype=UUID, doc='The UUID of the node')
with_mpi: QbAnyField(backend_key=attributes.with_mpi, is_attribute=True, dtype=bool
  | None, root=bool, doc='Whether the executable should be run as an MPI program.
  This option can be left unspecified in which case `None` will be set and it is left
  up to the calculation job plugin or inputs whether to run with MPI')
wrap_cmdline_params: QbAnyField(backend_key=attributes.wrap_cmdline_params, is_attribute=True,
  dtype=bool, doc='Whether all command line parameters to be passed to the engine
  command should be wrapped in a double quotes to form a single argument. This should
  be set to `True` for Docker')
