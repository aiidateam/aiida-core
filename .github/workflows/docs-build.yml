name: docs-build

on:
  push:
    branches-ignore: [gh-pages]
  pull_request:
    branches-ignore: [gh-pages]
    paths: [docs/**]

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:

  docs-linkcheck:

    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Install aiida-core and docs deps
      uses: ./.github/actions/install-aiida-core
      with:
        python-version: '3.10'
        extras: docs,tests,rest,atomic_tools
        from-lock: 'false'

    - name: Build HTML docs
      id: linkcheck
      run: |
        make -C docs html linkcheck 2>&1 | tee check.log
        {
          echo 'broken<<EOF_BROKEN'
          grep '(line\s*[0-9]*)\(\s\)broken\(\s\)' check.log || true
          echo 'EOF_BROKEN'
        } >> "$GITHUB_OUTPUT"
      env:
        SPHINXOPTS: -nW --keep-going

    - name: Show docs build check results
      env:
        BROKEN_LINKS: ${{ steps.linkcheck.outputs.broken }}
      run: |
        if [ -z "$BROKEN_LINKS" ]; then
            echo "No broken links found."
            exit 0
        else
            echo "Broken links found:"
            echo "$BROKEN_LINKS"
            exit 1
        fi
