attributes: QbAttributesField(dtype=CifData.AttributesModel, doc='The node attributes')
computer: QbNumericField(dtype=int | None, root=int, doc='The PK of the computer')
ctime: QbNumericField(dtype=datetime, doc='The creation time of the node')
description: QbStrField(dtype=str, doc='The node description')
extras: QbDictField(dtype=dict[str, Any], root=dict, doc='The node extras')
filename: QbStrField(backend_key=attributes.filename, is_attribute=True, dtype=str,
  doc='The name of the stored file')
formulae: QbArrayField(backend_key=attributes.formulae, is_attribute=True, dtype=list[str]
  | None, root=list, doc='List of formulae contained in the CIF file')
label: QbStrField(dtype=str, doc='The node label')
md5: QbStrField(backend_key=attributes.md5, is_attribute=True, dtype=str | None, root=str,
  doc='MD5 checksum of the file contents')
mtime: QbNumericField(dtype=datetime, doc='The modification time of the node')
node_type: QbStrField(dtype=Literal['data.core.cif.CifData.'], root=Literal, doc='The
  type of the node.')
parse_policy: QbStrField(backend_key=attributes.parse_policy, is_attribute=True, dtype=Literal['eager',
  'lazy'], root=Literal, doc='Parse policy for parsing with PyCIFRW')
pk: QbNumericField(dtype=int, doc='The primary key of the entity')
process_type: QbStrField(dtype=str | None, root=str, doc='The process type of the
  node')
repository_metadata: QbDictField(dtype=dict[str, Any], root=dict, doc='Virtual hierarchy
  of the file repository')
scan_type: QbStrField(backend_key=attributes.scan_type, is_attribute=True, dtype=Literal['standard',
  'flex'], root=Literal, doc='Scan type for parsing with PyCIFRW')
source: QbDictField(backend_key=attributes.source, is_attribute=True, dtype=dict |
  None, root=dict, doc='Source of the data')
spacegroup_numbers: QbArrayField(backend_key=attributes.spacegroup_numbers, is_attribute=True,
  dtype=list[str] | None, root=list, doc='List of space group numbers of the structure')
user: QbNumericField(dtype=int, doc='The PK of the user who owns the node')
uuid: QbAnyField(dtype=UUID, doc='The UUID of the node')
