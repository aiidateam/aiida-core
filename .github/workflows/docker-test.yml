name: Test newly built images

on:
  workflow_call:
    inputs:
      runsOn:
        description: GitHub Actions Runner image
        required: true
        type: string
      images:
        description: Images built in build step
        required: true
        type: string
      target:
        description: Target image for testing
        required: true
        type: string

permissions:
  contents: read
  # Pull images built in the build step from ghcr.io
  packages: read

jobs:

  test:
    runs-on: ${{ inputs.runsOn }}
    timeout-minutes: 20
    defaults:
      run:
        working-directory: .docker

    steps:

    - name: Checkout Repo ⚡️
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Login to GitHub Container Registry 🔑
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0   # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set Up Python 🐍
      if: ${{ startsWith(inputs.runsOn, 'ubuntu') }}
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: pip

    - name: Install dependencies 📦
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest -s --variant ${{ inputs.target }} tests/
      env: ${{ fromJSON(inputs.images) }}
