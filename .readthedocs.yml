version: 2

build:
  apt_packages:
  - graphviz
  os: ubuntu-24.04
  tools:
    python: '3.12'

python:
  install:
  - method: uv
    command: sync
    path: .
    extras:
    - docs
    - tests
    - rest
    - atomic_tools

sphinx:
  builder: html
  fail_on_warning: true
  configuration: docs/source/conf.py

search:
  ranking:
    reference/apidoc/*: -7
